groups:
  - name: task-manager-alerts
    rules:
      - alert: AppDown
        expr: up{job="task-manager-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Task Manager API is down"
          description: "The application has been unreachable for more than 1 minute."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is above 500ms for 2 minutes."

      - alert: HighErrorRate
        expr: rate(http_request_duration_ms_count{status_code=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "More than 10% of requests are returning 5xx errors."
