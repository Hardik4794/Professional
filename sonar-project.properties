# SonarQube Project Configuration
sonar.projectKey=Task-Manager-API
sonar.projectName=Task Manager API
sonar.projectVersion=1.0.0
 
# Source and test directories
sonar.sources=src
sonar.tests=tests
 
# Exclusions - skip node_modules, coverage output, and test files from source analysis
sonar.exclusions=node_modules/**,coverage/**
sonar.test.exclusions=node_modules/**,coverage/**
sonar.coverage.exclusions=src/server.js
 
# Test coverage report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
 
# Language and encoding
sonar.language=js
sonar.sourceEncoding=UTF-8
 
# Quality Gate - pipeline will FAIL if gate conditions are not met
# Gate conditions configured in SonarQube UI:
#   - Coverage < 60% → FAIL
#   - Reliability Rating worse than A → FAIL
#   - Security Rating worse than A → FAIL
#   - Maintainability Rating worse than A → FAIL
sonar.qualitygate.wait=true
 
# Duplication threshold
sonar.cpd.js.minimumTokens=50
