version: '3.8'

services:
  app:
    image: task-manager-api:${APP_VERSION:-latest}
    container_name: taskmanager-staging
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/taskmanager_staging
      - JWT_SECRET=${JWT_SECRET:-staging-secret-key}
      - JWT_EXPIRES_IN=7d
      - APP_VERSION=${APP_VERSION:-1.0.0}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:6.0
    container_name: mongo-staging
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - taskmanager-net
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - taskmanager-net
    depends_on:
      - prometheus

networks:
  taskmanager-net:
    driver: bridge

volumes:
  mongo-data:
  grafana-data:
